<article class="podcast-card">
  <div class="podcast-card__media">
    <img [ngSrc]="coverImage()" fill priority="true" class="podcast-card__image" [alt]="coverAlt()" />
  </div>

  <div class="podcast-card__body">
    <div class="podcast-card__intro">
      <p class="podcast-card__kicker">{{ kicker() }}</p>
      <h2 class="podcast-card__title">{{ title() }}</h2>
      <p class="podcast-card__description">{{ description() }}</p>
    </div>

    <div class="podcast-card__actions">
      <ntv-button
        class="podcast-card__cta"
        variant="ghost"
        color="custom"
        customColor="#017D00"
        rounded="xl"
        size="md"
        fontSize="18px"
        [shadow]="false"
        [noFocusRing]="false"
        (buttonClick)="spotifyClick.emit()"
      >
        <span class="podcast-card__cta-text">Spotify</span>
        <svg class="podcast-card__cta-icon" aria-hidden="true">
          <use href="icons/icon-sprite.svg#icon-arrow"></use>
        </svg>
      </ntv-button>

      <ntv-button
        class="podcast-card__cta"
        variant="ghost"
        color="custom"
        customColor="#C80C20"
        rounded="xl"
        size="md"
        fontSize="18px"
        [shadow]="false"
        [noFocusRing]="false"
        (buttonClick)="appleMusicClick.emit()"
      >
        <span class="podcast-card__cta-text">Apple Music</span>
        <svg class="podcast-card__cta-icon" aria-hidden="true">
          <use href="icons/icon-sprite.svg#icon-arrow"></use>
        </svg>
      </ntv-button>
    </div>
  </div>
</article>
