<ntv-modal
  [isVisible]="isOpen()"
  size="small"
  [showHeader]="true"
  (modalClose)="closed.emit()"
  (backdropClick)="closed.emit()"
  (escapeKey)="closed.emit()"
>
  <div modal-header class="contact-modal__header">
    <h2 class="contact-modal__title">{{ title() }}</h2>
    <button
      #closeButton
      type="button"
      class="contact-modal__close"
      aria-label="Close"
      (click)="closed.emit()"
    >
      <svg class="contact-modal__close-icon" aria-hidden="true">
        <use href="icons/icon-sprite.svg#icon-close"></use>
      </svg>
    </button>
  </div>

  <p class="contact-modal__value">{{ value() }}</p>

  <div class="contact-modal__actions">
    @for (action of actions(); track action.label) {
      @if (action.href) {
        <a class="contact-modal__action" [href]="action.href">{{ action.label }}</a>
      } @else {
        <button type="button" class="contact-modal__action contact-modal__action--copy" (click)="onCopy()">
          {{ copied() ? 'Copied!' : action.label }}
        </button>
      }
    }
  </div>
</ntv-modal>
